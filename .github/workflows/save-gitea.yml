name: Save and Release Docker Images

on:
  push:
    paths:
      - 'images.txt'
  workflow_dispatch:

jobs:
  save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Prepare saved directory
        run: mkdir savedd
      
      - name: Check if workflow updated
        run: |
          git fetch origin
          BASE=$(git rev-parse HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "BASE=$BASE" >> $GITHUB_ENV
          if git diff --name-only "$BASE" | grep '^.github/workflows/'; then
            echo "workflow_changed=true" >> $GITHUB_OUTPUT
            echo "workflow_changed=true" >> $GITHUB_ENV
          else
            echo "workflow_changed=false" >> $GITHUB_OUTPUT
            echo "workflow_changed=false" >> $GITHUB_ENV
          fi

      - name: Get changed images (or full list)
        run: |
          echo "workflow_changed is: ${{ steps.check_workflow_change.outputs.workflow_changed }}"
          if [ $workflow_changed = "true" ]; then
            echo "Workflow changed. Force using all images."
            cp images.txt changed_images.txt
          else
            diff_lines=$(git diff "$BASE" -- images.txt | grep '^+' | grep -v '^+++' | cut -c 2-)
            echo "$diff_lines" > changed_images.txt
          fi
          cat changed_images.txt
    
      - name: Pull and Save changed images
        run: |
          while read -r image; do
            [ -z "$image" ] && continue
            echo "Pulling $image"
            docker pull "$image"
            safe_name=$(echo "$image" | sed 's/[/:]/_/g')
            docker save "$image" -o "saved/${safe_name}.tar"
          done < changed_images.txt

      - name: Create GitHub Release (if not exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="docker-images"
          # 检查 release 是否存在
          if gh release view "$tag" > /dev/null 2>&1; then
            echo "Release $tag already exists. Skipping creation."
          else
            gh release create "$tag" --title "Docker Images" --notes "Auto-uploaded Docker image tarballs"
          fi
          echo "TAG_NAME=$tag" >> $GITHUB_ENV

      - name: Upload each tar file to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in saved/*.tar; do
            echo "Uploading $file to release $TAG_NAME"
            gh release upload "$TAG_NAME" "$file" --clobber
          done
